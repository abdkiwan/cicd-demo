name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: ECR image tag to deploy
        required: true
        type: string

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: cicd-demo

jobs:
  deploy:
    name: deploy-${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify image tag exists in ECR
        run: |
          aws ecr describe-images \
            --repository-name "${{ env.ECR_REPOSITORY }}" \
            --image-ids imageTag="${{ inputs.image_tag }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy image on App Runner
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          SERVICE_ARN: ${{ secrets.APP_RUNNER_SERVICE_ARN }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: python scripts/manual_deploy.py

      - name: Summary
        run: |
          {
            echo "### Deploy complete"
            echo "- **Environment:** ${{ inputs.environment }}"
            echo "- **Image tag:** ${{ inputs.image_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
