name: Deploy

on:
  push:
    branches:
      - main

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: cicd-demo

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy image to App Runner staging
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "${{ needs.build-and-push.outputs.image_uri }}",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "8000",
                  "RuntimeEnvironmentVariables": {
                    "APP_ENV": "staging",
                    "APP_NAME": "CI/CD Demo API",
                    "APP_VERSION": "${{ github.sha }}"
                  }
                }
              },
              "AuthenticationConfiguration": {
                "AccessRoleArn": "'"$(aws apprunner describe-service --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" --query "Service.SourceConfiguration.AuthenticationConfiguration.AccessRoleArn" --output text)"'"
              },
              "AutoDeploymentsEnabled": false
            }'

  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - deploy-staging
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy image to App Runner production
        run: |
          aws apprunner update-service \
            --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" \
            --source-configuration '{
              "ImageRepository": {
                "ImageIdentifier": "${{ needs.build-and-push.outputs.image_uri }}",
                "ImageRepositoryType": "ECR",
                "ImageConfiguration": {
                  "Port": "8000",
                  "RuntimeEnvironmentVariables": {
                    "APP_ENV": "production",
                    "APP_NAME": "CI/CD Demo API",
                    "APP_VERSION": "${{ github.sha }}"
                  }
                }
              },
              "AuthenticationConfiguration": {
                "AccessRoleArn": "'"$(aws apprunner describe-service --service-arn "${{ secrets.APP_RUNNER_SERVICE_ARN }}" --query "Service.SourceConfiguration.AuthenticationConfiguration.AccessRoleArn" --output text)"'"
              },
              "AutoDeploymentsEnabled": false
            }'